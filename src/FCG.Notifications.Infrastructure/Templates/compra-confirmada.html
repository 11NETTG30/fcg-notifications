<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

        <!-- Header -->
        <tr>
          <td style="background-color:#1a1a2e;padding:32px 40px;text-align:center;">
            <h1 style="margin:0;color:#e94560;font-size:28px;letter-spacing:2px;">FCG</h1>
            <p style="margin:4px 0 0;color:#a0a0b8;font-size:13px;letter-spacing:1px;">FIAP CLOUD GAMES</p>
          </td>
        </tr>

        <!-- Banner aprovado -->
        <tr>
          <td style="background-color:#d4edda;padding:16px 40px;text-align:center;">
            <p style="margin:0;color:#155724;font-size:15px;font-weight:bold;">✅ Pagamento aprovado</p>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:40px;">
            <h2 style="margin:0 0 8px;color:#1a1a2e;font-size:22px;">Compra confirmada! 🎮</h2>
            <p style="margin:0 0 24px;color:#555555;font-size:15px;line-height:1.6;">
              O jogo já está disponível na sua biblioteca.
            </p>

            <!-- Detalhes -->
            <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #eeeeee;border-radius:6px;margin-bottom:24px;">
              <tr style="border-bottom:1px solid #eeeeee;">
                <td style="padding:14px 20px;color:#888888;font-size:13px;">Pedido</td>
                <td style="padding:14px 20px;color:#1a1a2e;font-size:13px;font-family:monospace;text-align:right;">{{ORDER_ID}}</td>
              </tr>
              <tr style="border-bottom:1px solid #eeeeee;">
                <td style="padding:14px 20px;color:#888888;font-size:13px;">Pagamento</td>
                <td style="padding:14px 20px;color:#1a1a2e;font-size:13px;font-family:monospace;text-align:right;">{{PAYMENT_ID}}</td>
              </tr>
              <tr>
                <td style="padding:14px 20px;color:#888888;font-size:13px;">Status</td>
                <td style="padding:14px 20px;text-align:right;">
                  <span style="background-color:#d4edda;color:#155724;font-size:12px;font-weight:bold;padding:4px 10px;border-radius:20px;">APROVADO</span>
                </td>
              </tr>
            </table>

            <p style="margin:0;color:#555555;font-size:14px;line-height:1.6;">
              Boas partidas!
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:#f8f8fc;padding:24px 40px;text-align:center;border-top:1px solid #eeeeee;">
            <p style="margin:0;color:#aaaaaa;font-size:12px;">
              Este e-mail foi enviado automaticamente. Por favor, não responda.
            </p>
            <p style="margin:8px 0 0;color:#aaaaaa;font-size:12px;">© 2025 FIAP Cloud Games</p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
